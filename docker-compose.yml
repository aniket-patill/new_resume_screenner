services:
  db:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-}
      MYSQL_ALLOW_EMPTY_PASSWORD: ${MYSQL_ALLOW_EMPTY_PASSWORD:-yes}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-hiringai}
    ports:
      - "127.0.0.1:${MYSQL_PORT_BIND:-3310}:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "--silent"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "127.0.0.1:${REDIS_PORT_BIND:-6381}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  qdrant:
    image: qdrant/qdrant:latest
    restart: unless-stopped
    ports:
      - "127.0.0.1:${QDRANT_HTTP_PORT_BIND:-6336}:6333"
    volumes:
      - qdrant_data:/qdrant/storage

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "127.0.0.1:${BACKEND_PORT_BIND:-8200}:8000"
    env_file:
      - ./backend/.env
    environment:
      DB_HOST: db
      DB_USER: ${DB_USER:-root}
      DB_PASSWORD: ${DB_PASSWORD:-}
      DB_NAME: ${DB_NAME:-hiringai}
      DB_PORT: 3306
      REDIS_URL: redis://redis:6379/0
      QDRANT_URL: http://qdrant:6333
      PYTHONUNBUFFERED: "1"
    volumes:
      - resume_media:/app/media
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started
    command: uvicorn main:app --host 0.0.0.0 --port 8000
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      DB_HOST: db
      DB_USER: ${DB_USER:-root}
      DB_PASSWORD: ${DB_PASSWORD:-}
      DB_NAME: ${DB_NAME:-hiringai}
      DB_PORT: 3306
      REDIS_URL: redis://redis:6379/0
      QDRANT_URL: http://qdrant:6333
      WORKER_CONCURRENCY: ${WORKER_CONCURRENCY:-3}
      PYTHONUNBUFFERED: "1"
    volumes:
      - resume_media:/app/media
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started
    command: python -u worker.py

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-}
        VITE_CLERK_PUBLISHABLE_KEY: ${VITE_CLERK_PUBLISHABLE_KEY:-}
        VITE_VAPI_PUBLIC_KEY: ${VITE_VAPI_PUBLIC_KEY:-}
    restart: unless-stopped
    ports:
      - "127.0.0.1:${FRONTEND_PORT_BIND:-3200}:80"
    depends_on:
      - backend

volumes:
  db_data:
  qdrant_data:
  resume_media:
